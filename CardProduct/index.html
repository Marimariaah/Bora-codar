<!DOCTYPE html>
<html lang="pt-br" class="animated">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card </title>
    <link rel="stylesheet" href="estilo.css">
    <script src="/animacao.js"></script>
</head>

<body>
    <div id="app">
        <div id="product-image">
            <button id="btn-360" onclick="toggle()">
                <img src="./assert/btn-360.svg" alt="Clique nesse botão para animar o produto">
            </button>
            <button id="btn-close" onclick="toggle()">
                <img src="./assert/btn-close.svg" alt="Parar a animação do produto">
            </button>

            <img id="static" src="./assert/sofa.jpg" alt="Sofá Margot II - Rosé">
            <img id="animated" src="./assert/sofa.gif" alt="Sofá Margot II - Rosé - Animação 360°">

        </div>

        <div id="product-details">
            <h4> CÓDIGO: 42404</h4>
            <h1>Sofá Margot II - Rosé</h1>
            <p> R$ 4.000,00</p>
            <button>ADICIONAR AO CARRINHO</button>
        </div>
    </div>
</body>

</html>
